<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PinjamIn</title>

<style>
* { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
body { margin: 0; background: #f5f7fb; }

/* DARK MODE */
.dark { background: #1e293b; color: white; }
.dark .card,.dark table,.dark .modal-content { background: #334155; color: white; }
.dark th { background: #475569; }
.dark input,.dark select { background: #475569; color: white; border: none; }

/* LOGIN */
.login-wrapper { height:100vh; display:flex; justify-content:center; align-items:center; background:linear-gradient(135deg,#2563eb,#1e40af); }
.login-card { background:white; padding:40px 30px; border-radius:16px; width:320px; text-align:center; }

/* NAVBAR */
.navbar { background:#2563eb; color:white; padding:15px; display:flex; justify-content:space-between; }

/* BUTTON */
.btn { padding:10px; border:none; cursor:pointer; border-radius:10px; }
.btn-primary { background:#2563eb; color:white; }
.btn-secondary { background:white; color:#2563eb; }

/* CHAT */
#chatbot { position:fixed; bottom:20px; right:20px; width:300px; background:white; border-radius:10px; overflow:hidden; }
#chatBox { height:200px; overflow:auto; padding:10px; }

.page { display:none; }
.page.active { display:block; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage" class="login-wrapper">
    <div class="login-card">
        <h2>PinjamIn</h2>
        <input id="username" placeholder="Username"><br><br>
        <input id="password" type="password" placeholder="Password"><br><br>
        <button onclick="login()" class="btn btn-primary">Masuk</button>
    </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="navbar">
    <div>PinjamIn</div>
    <div>
        <button class="btn btn-primary" onclick="showChat()">Chat AI</button>
    </div>
</div>

<div class="container">

    <h2>Dashboard</h2>

    <table border="1" width="100%">
        <thead>
            <tr>
                <th>Barang</th>
                <th>Peminjam</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="data"></tbody>
    </table>

</div>
</div>

<!-- CHATBOT -->
<div id="chatbot" style="display:none;">
    <div style="background:#2563eb;color:white;padding:10px;display:flex;justify-content:space-between;">
        <span>AI Chat</span>
        <button onclick="showChat()">X</button>
    </div>

    <div id="chatBox"></div>

    <div style="display:flex;">
        <input id="chatInput" style="flex:1;padding:10px;">
        <button id="chatSendBtn" class="btn btn-primary">Kirim</button>
    </div>
</div>

<script>
let data = [];

function login(){
    if(username.value=="revel" && password.value=="liam9904"){
        loginPage.style.display="none";
        app.style.display="block";
    } else {
        alert("Login salah");
    }
}

function showChat(){
    let c = document.getElementById("chatbot");
    c.style.display = c.style.display==="none"?"block":"none";
}

/* ================= CHAT AI GEMINI ================= */

const API_KEY = "AIzaSyCzG3fXh5TbDLBa8O7YOd9ZOHzrX1u-r6o";

async function sendChatMessage(){
    const input = document.getElementById("chatInput");
    const chatBox = document.getElementById("chatBox");

    let text = input.value.trim();
    if(!text) return;

    chatBox.innerHTML += `<div><b>Kamu:</b><br>${text}</div>`;
    input.value = "";

    const loadingId = "loading";
    chatBox.innerHTML += `<div id="${loadingId}">AI: mengetik...</div>`;

    try {
        const res = await fetch(
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + API_KEY,
            {
                method:"POST",
                headers:{ "Content-Type":"application/json" },
                body:JSON.stringify({
                    contents:[{parts:[{text}]}]
                })
            }
        );

        const result = await res.json();
        document.getElementById(loadingId)?.remove();

        const reply = result?.candidates?.[0]?.content?.parts?.[0]?.text || "AI tidak merespon";

        chatBox.innerHTML += `<div><b>AI:</b><br>${reply}</div>`;

    } catch(err){
        document.getElementById(loadingId)?.remove();
        chatBox.innerHTML += `<div style="color:red;">Error koneksi</div>`;
    }

    chatBox.scrollTop = chatBox.scrollHeight;
}

document.getElementById("chatSendBtn").addEventListener("click", sendChatMessage);

document.getElementById("chatInput").addEventListener("keypress", (e)=>{
    if(e.key==="Enter") sendChatMessage();
});
</script>

</body>
</html>
